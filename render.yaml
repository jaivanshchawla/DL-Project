services:
  # Backend API Service
  - type: web
    name: connect-four-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: CORS_ENABLED
        value: "true"
      - key: CORS_ORIGINS
        value: 'https://connect-four-ai-frontend.vercel.app,https://*.vercel.app,https://*.onrender.com'
      - key: FRONTEND_URL
        value: https://connect-four-ai-frontend.vercel.app
      - key: BACKEND_URL
        value: https://connect-four-ai-backend.onrender.com
      # Disable external services until they're deployed
      - key: DISABLE_EXTERNAL_SERVICES
        value: "true"
      # Update these URLs to point to the actual deployed services
      - key: ML_SERVICE_URL
        value: https://connect-four-ml.onrender.com
      - key: CONTINUOUS_LEARNING_WS_URL
        value: wss://connect-four-learning.onrender.com/ws
      - key: AI_COORDINATION_WS_URL
        value: wss://connect-four-coordination.onrender.com/ws/backend_orchestrator
      - key: PYTHON_TRAINER_URL
        value: https://connect-four-trainer.onrender.com

  # ML Service (Main ML inference)
  - type: web
    name: connect-four-ml
    runtime: python
    rootDir: ml_service
    buildCommand: pip install -r requirements.production.txt
    startCommand: uvicorn ml_service:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: BACKEND_URL
        value: https://connect-four-ai-backend.onrender.com
      - key: CORS_ORIGINS
        value: 'https://connect-four-ai-frontend.vercel.app,https://connect-four-ai-backend.onrender.com,https://*.vercel.app,https://*.onrender.com'
      - key: PYTHONUNBUFFERED
        value: "1"

  # Continuous Learning Service
  - type: web
    name: connect-four-learning
    runtime: python
    rootDir: ml_service
    buildCommand: pip install -r requirements.production.txt
    startCommand: uvicorn continuous_learning_service:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8002
      - key: ENVIRONMENT
        value: production
      - key: ML_SERVICE_URL
        value: https://connect-four-ml.onrender.com
      - key: BACKEND_URL
        value: https://connect-four-ai-backend.onrender.com
      - key: PYTHONUNBUFFERED
        value: "1"

  # AI Coordination Hub
  - type: web
    name: connect-four-coordination
    runtime: python
    rootDir: ml_service
    buildCommand: pip install -r requirements.production.txt
    startCommand: uvicorn ai_coordination_hub:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PORT
        value: 8003
      - key: ENVIRONMENT
        value: production
      - key: BACKEND_URL
        value: https://connect-four-ai-backend.onrender.com
      - key: ML_SERVICE_URL
        value: https://connect-four-ml.onrender.com
      - key: PYTHONUNBUFFERED
        value: "1"

  # Python Trainer Service (for model training)
  - type: web
    name: connect-four-trainer
    runtime: python
    rootDir: backend/src/ai/hybrid-architecture/python-trainer
    buildCommand: pip install -r requirements.txt
    startCommand: python training_service_minimal.py
    envVars:
      - key: PORT
        value: 8004
      - key: ENVIRONMENT
        value: production
      - key: BACKEND_URL
        value: https://connect-four-ai-backend.onrender.com
      - key: PYTHONUNBUFFERED
        value: "1"
